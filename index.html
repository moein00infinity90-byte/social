<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>صفحه شخصی من</title>
  <style>
    /* استایل‌های ظاهری */
    body {
      margin: 0;
      font-family: 'Tahoma', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); /* پس‌زمینه رنگی */
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #333;
    }
    .card {
      background: white;
      width: 90%;
      max-width: 400px;
      padding: 30px;
      border-radius: 25px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      text-align: center;
    }
    /* استایل عکس پروفایل */
    .profile-img {
      width: 120px;
      height: 120px;
      border-radius: 50%; /* گرد کردن عکس */
      object-fit: cover; /* جلوگیری از کشیدگی عکس */
      border: 4px solid #764ba2;
      margin-bottom: 15px;
    }
    h1 { margin: 10px 0; font-size: 24px; }
    p { color: #777; font-size: 14px; margin-bottom: 25px; }

    .links { display: flex; flex-direction: column; gap: 15px; }
    
    /* استایل دکمه‌ها */
    .btn {
      text-decoration: none;
      color: white;
      padding: 12px;
      border-radius: 10px;
      font-weight: bold;
      transition: transform 0.3s ease;
    }
    .btn:hover { transform: scale(1.05); }

    /* رنگ‌های شخصی برای دکمه‌ها */
    .instagram { background: #E1306C; }
    .youtube   { background: #FF0000; }
    .telegram  { background: #0088cc; }
    .discord   { background: #5865F2; }
  </style>
</head>
<body>

  <div class="card">
    <!-- ۱. بخش عکس پروفایل -->
    <img src="./avatar.png" alt="Profile Picture" class="profile-img">

    <!-- ۲. بخش نام و توضیحات -->
    <h1>Moein00Infinity</h1>
    <p>خوش آمدید به صفحه شبکه های اجتماعی من</p>

    <!-- ۳. بخش لینک‌ها -->
    <div class="links">
      <!-- لینک اینستاگرام -->
      <a href="https://instagram.com/YOUR_USERNAME" class="btn instagram" target="_blank">اینستاگرام</a>
      
      <!-- لینک یوتیوب -->
      <a href="https://youtube.com/YOUR_CHANNEL" class="btn youtube" target="_blank">یوتیوب</a>

      <!-- لینک تلگرام -->
      <a href="https://t.me/YOUR_USERNAME" class="btn telegram" target="_blank">تلگرام</a>

      <!-- لینک دیسکورد -->
      <a href="https://discord.gg/YOUR_INVITE" class="btn discord" target="_blank">دیسکورد</a>
    </div>
  </div>

</body>
</html>

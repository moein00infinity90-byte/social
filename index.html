<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moein00Infinity social</title>
    <link rel="icon" type="image/png" href="./avatar.png">
    
    <!-- 🔥 Font Awesome برای آیکون‌ها -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Vazirmatn', 'Tahoma', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(255,255,255,0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(255,255,255,0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 40px 30px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
            position: relative;
            z-index: 1;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #fff;
            box-shadow: 0 10px 30px rgba(118, 75, 162, 0.4);
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }

        .avatar:hover {
            transform: scale(1.05) rotate(3deg);
        }

        h1 {
            color: #2d3748;
            font-size: 26px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .username {
            color: #764ba2;
            font-size: 16px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .description {
            color: #4a5568;
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .social-links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* دکمه‌های ساده */
        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 14px 20px;
            color: white;
            text-decoration: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .social-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.6s ease;
        }

        .social-btn:hover::before {
            left: 100%;
        }

        .social-btn:hover {
            transform: translateY(-3px);
        }

        .social-btn i {
            font-size: 24px;
        }

        /* ===== دکمه ترکیبی (پروفایل + استریم) ===== */
        .social-btn-combo {
            display: flex;
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .social-btn-combo:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.3);
        }

        .combo-profile,
        .combo-stream {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 12px;
            color: white;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.3s ease;
            position: relative;
        }

        .combo-profile {
            background: linear-gradient(135deg, #ea1d5d 0%, #c4144a 100%);
        }

        .combo-stream {
            background: linear-gradient(135deg, #ff4081 0%, #ff1744 100%);
            border-right: 2px solid rgba(255, 255, 255, 0.2);
        }

        .combo-profile:hover,
        .combo-stream:hover {
            filter: brightness(1.15);
        }

        .combo-profile i,
        .combo-stream i {
            font-size: 22px;
        }

        /* نشانگر LIVE */
        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(255, 255, 255, 0.25);
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 700;
            margin-right: 4px;
        }

        .live-dot {
            width: 7px;
            height: 7px;
            background: #fff;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        /* رنگ‌های مخصوص هر شبکه اجتماعی */
        .rubika { 
            background: linear-gradient(135deg, #7eff28 0%, #177cff 50%,  #ff1717 100%);
            box-shadow: 0 8px 20px rgba(255, 23, 68, 0.3);
        }
        .rubika:hover { box-shadow: 0 12px 25px rgba(255, 23, 68, 0.5); }

        .discord {
            background: linear-gradient(135deg, #5865F2 0%, #4752c4 100%);
            box-shadow: 0 8px 20px rgba(88, 101, 242, 0.3);
        }
        .discord:hover { box-shadow: 0 12px 25px rgba(88, 101, 242, 0.5); }

        .rgb-animated {
    background: linear-gradient(
        270deg,
        #ff0000,    /* قرمز */
        #ff7f00,    /* نارنجی */
        #ffff00,    /* زرد */
        #00ff00,    /* سبز */
        #0000ff,    /* آبی */
        #4b0082,    /* نیلی */
        #9400d3,    /* بنفش */
        #ff0000     /* برگشت به قرمز */
    );
    background-size: 400% 400%;
    animation: rgbFlow 6s ease infinite;
    box-shadow: 0 8px 20px rgba(255, 0, 128, 0.4);
}

.rgb-animated:hover {
    animation-duration: 2s; /* هنگام هاور سریع‌تر می‌شود */
}

@keyframes rgbFlow {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

        .footer {
            margin-top: 30px;
            color: #a0aec0;
            font-size: 12px;
        }

        @media (max-width: 480px) {
            .container { padding: 30px 20px; }
            h1 { font-size: 22px; }
            .avatar { width: 110px; height: 110px; }
            .combo-profile,
            .combo-stream {
                font-size: 13px;
                padding: 12px 8px;
                gap: 5px;
            }
            .combo-profile i,
            .combo-stream i {
                font-size: 18px;
            }
            .live-badge {
                font-size: 9px;
                padding: 2px 6px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="./avatar.png" alt="آواتار" class="avatar" onerror="this.src='https://via.placeholder.com/130/764ba2/ffffff?text=M'">
        
        <h1>Moein00Infinity social</h1>
        <p class="description">خوش آمدید به صفحه شبکه‌های اجتماعی Moein</p>

        <div class="social-links">
            
            <!-- 🎲 روبیکا -->
            <a href="https://rubika.ir/MoInfinity" target="_blank" rel="noopener noreferrer" class="social-btn rgb-animated">
                <i class="fas fa-cube"></i>
                روبیکا
            </a>

            <!-- 🎬 آپارات (ترکیبی: پروفایل + استریم) -->
            <div class="social-btn-combo">
                <a href="https://www.aparat.com/moein00infinity" target="_blank" rel="noopener noreferrer" class="combo-profile">
                    <i class="fas fa-video"></i>
                    <span>آپارات</span>
                </a>
                <a href="https://www.aparat.com/moein00infinity/live" target="_blank" rel="noopener noreferrer" class="combo-stream">
                    <i class="fas fa-broadcast-tower"></i>
                    <span>استریم</span>
                    <span class="live-badge">
                        <span class="live-dot"></span>
                        LIVE
                    </span>
                </a>
            </div>

            <!-- 💬 دیسکورد -->
            <a href="https://discord.gg/YOUR_INVITE" target="_blank" rel="noopener noreferrer" class="social-btn discord">
                <i class="fab fa-discord"></i>
                دیسکورد
            </a>

        </div>

        <div class="footer">
            © 2026 Moein00Infinity
        </div>
    </div>
</body>
</html>
